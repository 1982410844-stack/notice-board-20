<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>付款下单</title>
    <meta name="description" content="商品付款下单页面。" />
    <style>
      :root {
        --page: #0b1116;
        --paper: rgba(16, 23, 29, 0.78);
        --paper-strong: rgba(20, 29, 36, 0.92);
        --ink: #edf8f5;
        --muted: #aab8bd;
        --line: rgba(133, 255, 216, 0.22);
        --green: #55f2c1;
        --green-soft: rgba(85, 242, 193, 0.14);
        --blue: #79a8ff;
        --coral: #ffb06b;
        --shadow: 0 22px 60px rgba(0, 0, 0, 0.35);
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        min-height: 100vh;
        background:
          linear-gradient(115deg, rgba(38, 255, 185, 0.14), rgba(11, 17, 22, 0) 32%),
          linear-gradient(245deg, rgba(121, 168, 255, 0.14), rgba(11, 17, 22, 0) 42%),
          var(--page);
        color: var(--ink);
        font-family: Arial, "Microsoft YaHei", "PingFang SC", sans-serif;
      }
      body::before,
      body::after {
        content: "";
        position: fixed;
        inset: 0;
        z-index: -2;
        pointer-events: none;
      }
      body::before {
        background:
          repeating-linear-gradient(90deg, rgba(133, 255, 216, 0.08) 0 1px, transparent 1px 84px),
          repeating-linear-gradient(0deg, rgba(121, 168, 255, 0.07) 0 1px, transparent 1px 84px);
        mask-image: linear-gradient(to bottom, rgba(0, 0, 0, 0.92), rgba(0, 0, 0, 0.18));
      }
      body::after {
        z-index: -1;
        background:
          repeating-linear-gradient(135deg, transparent 0 22px, rgba(85, 242, 193, 0.07) 22px 23px, transparent 23px 58px),
          linear-gradient(to bottom, rgba(11, 17, 22, 0.18), rgba(11, 17, 22, 0.9));
      }
      a { color: inherit; text-decoration: none; }
      header {
        border-bottom: 1px solid var(--line);
        background: rgba(9, 14, 19, 0.78);
        backdrop-filter: blur(18px);
      }
      .topbar,
      main {
        width: min(920px, calc(100% - 32px));
        margin: 0 auto;
      }
      .topbar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 14px;
        padding: 14px 0;
      }
      .brand {
        color: var(--green);
        font-size: 18px;
        font-weight: 700;
        text-shadow: 0 0 18px rgba(85, 242, 193, 0.35);
      }
      .back {
        border: 1px solid rgba(133, 255, 216, 0.22);
        border-radius: 8px;
        background: rgba(15, 23, 30, 0.72);
        color: #d7e8e4;
        padding: 8px 12px;
        font-size: 14px;
      }
      main { padding: 34px 0 60px; }
      .payment-layout {
        display: grid;
        grid-template-columns: 330px minmax(0, 1fr);
        gap: 18px;
        align-items: start;
      }
      .image-panel,
      .pay-panel,
      .detail-panel {
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--paper);
        box-shadow: var(--shadow);
        backdrop-filter: blur(14px);
      }
      .image-panel { overflow: hidden; }
      .image-panel img {
        display: block;
        width: 100%;
        aspect-ratio: 1 / 1;
        object-fit: contain;
        background: #fff;
        padding: 28px;
      }
      .pay-panel { padding: 24px; }
      .eyebrow {
        margin: 0 0 10px;
        color: var(--green);
        font-size: 14px;
        font-weight: 700;
        text-shadow: 0 0 14px rgba(85, 242, 193, 0.28);
      }
      h1 { margin: 0; font-size: 34px; line-height: 1.2; }
      .price {
        margin: 14px 0 0;
        color: var(--coral);
        font-size: 30px;
        font-weight: 700;
      }
      .description {
        margin: 14px 0 0;
        color: var(--muted);
        line-height: 1.8;
      }
      .code-box {
        display: grid;
        gap: 10px;
        margin-top: 20px;
      }
      .code {
        min-height: 48px;
        border: 1px solid rgba(133, 255, 216, 0.22);
        border-radius: 8px;
        background: rgba(9, 14, 19, 0.64);
        color: var(--ink);
        display: flex;
        align-items: center;
        word-break: break-all;
        line-height: 1.65;
        padding: 12px;
      }
      .actions {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 10px;
        margin-top: 14px;
      }
      button,
      .button {
        border: 0;
        border-radius: 8px;
        min-height: 44px;
        background: linear-gradient(135deg, #2ed6a6, #6e9dff);
        color: #071016;
        cursor: pointer;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        font-weight: 700;
        padding: 0 14px;
        box-shadow: 0 12px 28px rgba(46, 214, 166, 0.22);
      }
      .button.secondary {
        background: rgba(121, 168, 255, 0.18);
        color: #d7e8e4;
        border: 1px solid rgba(121, 168, 255, 0.26);
      }
      .detail-panel {
        grid-column: 1 / -1;
        padding: 20px;
      }
      .detail-panel h2 { margin: 0 0 12px; font-size: 22px; }
      .features {
        display: grid;
        gap: 8px;
        margin: 0;
        padding: 0;
        list-style: none;
        color: #c5d2d6;
      }
      .features li {
        min-height: 22px;
        padding-left: 20px;
        position: relative;
      }
      .features li::before {
        content: "";
        width: 8px;
        height: 8px;
        border-radius: 50%;
        background: var(--green);
        position: absolute;
        left: 3px;
        top: 8px;
      }
      .toast {
        margin-top: 12px;
        border-radius: 8px;
        background: var(--green-soft);
        color: var(--green);
        line-height: 1.65;
        opacity: 0;
        padding: 10px 12px;
        transition: opacity 0.2s ease;
      }
      .toast.show { opacity: 1; }
      .empty {
        border: 1px dashed rgba(133, 255, 216, 0.32);
        border-radius: 8px;
        background: var(--paper);
        color: var(--muted);
        line-height: 1.8;
        padding: 24px;
      }
      @media (max-width: 760px) {
        .topbar { align-items: flex-start; flex-direction: column; }
        .payment-layout { grid-template-columns: 1fr; }
        h1 { font-size: 28px; }
        .actions { grid-template-columns: 1fr; }
      }
    </style>
  </head>
  <body>
    <header><div class="topbar"><a class="brand" href="./">付款下单</a><a class="back" href="./#shop">返回商品区</a></div></header>
    <main id="app"><div class="empty">正在加载商品信息...</div></main>
    <script>
      var app = document.getElementById("app");
      function escapeText(value) { return String(value == null ? "" : value).replace(/[&<>"']/g, function(char) { return { "&":"&amp;", "<":"&lt;", ">":"&gt;", "\"":"&quot;", "'":"&#039;" }[char]; }); }
      function getProductId() { return new URLSearchParams(window.location.search).get("product") || ""; }
      function copyText(text) { if (navigator.clipboard && navigator.clipboard.writeText) return navigator.clipboard.writeText(text); var input = document.createElement("textarea"); input.value = text; input.setAttribute("readonly", ""); input.style.position = "fixed"; input.style.left = "-9999px"; document.body.appendChild(input); input.select(); document.execCommand("copy"); document.body.removeChild(input); return Promise.resolve(); }
      function render(product) {
        var paymentCode = product.paymentCode || product.paymentUrl || "";
        var features = (product.features || []).map(function(item) { return '<li>' + escapeText(item) + '</li>'; }).join("");
        var html = '<section class="payment-layout">'
          + '<div class="image-panel"><img src="' + escapeText(product.image || "notice-cover.png") + '" alt="' + escapeText(product.name) + '" /></div>'
          + '<div class="pay-panel"><p class="eyebrow">' + escapeText(product.badge || "可购买") + '</p><h1>' + escapeText(product.name || "商品") + '</h1><div class="price">' + escapeText(product.price || "价格待定") + '</div><p class="description">' + escapeText(product.description || "") + '</p>'
          + '<div class="code-box"><strong>付款信息</strong><div class="code" id="payment-code">' + escapeText(paymentCode || "付款信息待配置") + '</div></div>'
          + '<div class="code-box"><strong>微信售后</strong><div class="code">微信号 Gan888S，付款后可添加微信咨询售后。</div></div>'
          + '<div class="actions"><button type="button" id="copy-payment">复制付款信息</button><a class="button secondary" href="./#shop">继续浏览</a></div><div class="toast" id="toast">已复制付款信息。</div></div>'
          + '<div class="detail-panel"><h2>商品说明</h2>' + (features ? '<ul class="features">' + features + '</ul>' : '<p class="description">暂无更多说明。</p>') + '</div></section>';
        app.innerHTML = html;
        document.getElementById("copy-payment").addEventListener("click", function() { copyText(paymentCode).then(function() { var toast = document.getElementById("toast"); toast.classList.add("show"); setTimeout(function() { toast.classList.remove("show"); }, 3800); }); });
      }
      fetch("products.json?v=20260609-pay").then(function(response) { return response.ok ? response.json() : Promise.reject(new Error("products.json")); }).then(function(data) { var id = getProductId(); var products = data.products || []; var product = products.find(function(item) { return item.id === id; }) || products.find(function(item) { return item.visible !== false; }); if (!product) { app.innerHTML = '<div class="empty">暂时没有可付款的商品。</div>'; return; } render(product); }).catch(function() { app.innerHTML = '<div class="empty">商品信息加载失败，请稍后再试。</div>'; });
    </script>
  </body>
</html>
