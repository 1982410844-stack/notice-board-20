<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>商品管理</title>
    <style>
      :root {
        --page: #f7f6f1;
        --paper: #fffdf8;
        --ink: #20201d;
        --muted: #625d55;
        --line: #dedbd1;
        --green: #2c5b49;
        --blue: #315b8a;
        --danger: #a24b43;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        background: var(--page);
        color: var(--ink);
        font-family: Arial, "Microsoft YaHei", "PingFang SC", sans-serif;
      }
      main {
        width: min(1120px, calc(100% - 32px));
        margin: 0 auto;
        padding: 32px 0 56px;
      }
      h1 { margin: 0; font-size: 34px; line-height: 1.25; }
      p { color: var(--muted); line-height: 1.75; }
      .toolbar,
      .panel,
      .product-editor {
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--paper);
      }
      .toolbar {
        display: grid;
        grid-template-columns: repeat(4, minmax(0, 1fr));
        gap: 12px;
        margin: 22px 0;
        padding: 16px;
      }
      .panel { padding: 16px; margin-bottom: 14px; }
      label {
        display: grid;
        gap: 6px;
        color: #47433c;
        font-size: 14px;
        font-weight: 700;
      }
      input,
      textarea {
        width: 100%;
        border: 1px solid #d8d4ca;
        border-radius: 8px;
        background: #fff;
        color: var(--ink);
        font: inherit;
        padding: 10px 11px;
      }
      textarea { min-height: 92px; resize: vertical; }
      .actions {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        margin: 14px 0 0;
      }
      button {
        min-height: 40px;
        border: 0;
        border-radius: 8px;
        background: var(--green);
        color: #fff;
        cursor: pointer;
        font-weight: 700;
        padding: 0 14px;
      }
      button.secondary { background: var(--blue); }
      button.ghost {
        border: 1px solid #d8d4ca;
        background: #fff;
        color: #49453e;
      }
      button.danger { background: var(--danger); }
      .product-list {
        display: grid;
        gap: 14px;
      }
      .product-editor {
        display: grid;
        gap: 12px;
        padding: 16px;
      }
      .editor-grid {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 12px;
      }
      .wide { grid-column: 1 / -1; }
      .status {
        min-height: 24px;
        color: var(--muted);
        font-size: 14px;
      }
      .preview {
        margin-top: 18px;
        white-space: pre-wrap;
        word-break: break-word;
        border: 1px dashed #c9c3b7;
        border-radius: 8px;
        padding: 14px;
        background: #fbfaf7;
        color: #49453e;
        font-family: Consolas, monospace;
        font-size: 13px;
      }
      @media (max-width: 820px) {
        .toolbar,
        .editor-grid { grid-template-columns: 1fr; }
      }
    </style>
  </head>
  <body>
    <main>
      <h1>商品管理</h1>
      <p>商品会保存到 GitHub 仓库的 products.json。付款链接可以填写 Stripe、PayPal、微信、支付宝或其它收款页面链接；如果暂时没有网页链接，也可以填写付款口令。</p>

      <section class="toolbar" aria-label="GitHub 设置">
        <label>GitHub Token
          <input id="token" type="password" autocomplete="off" placeholder="仅保存在当前浏览器" />
        </label>
        <label>账号
          <input id="owner" value="1982410844-stack" />
        </label>
        <label>仓库
          <input id="repo" value="notice-board-19" />
        </label>
        <label>分支
          <input id="branch" value="main" />
        </label>
      </section>

      <section class="panel">
        <label>售卖区说明
          <textarea id="store-subtitle"></textarea>
        </label>
        <div class="actions">
          <button id="load">载入线上商品</button>
          <button class="secondary" id="add">新增商品</button>
          <button class="ghost" id="download">下载配置</button>
          <button id="save">保存到 GitHub</button>
        </div>
        <p class="status" id="status"></p>
      </section>

      <section class="product-list" id="product-list" aria-live="polite"></section>
      <pre class="preview" id="preview"></pre>
    </main>

    <script>
      const state = {
        store: {
          title: "商品售卖区",
          subtitle: "这里可以展示商品、价格、图片和付款入口。配置付款链接后，访客点击按钮即可进入对应支付页面下单。",
          emptyTitle: "商品正在上架中",
          emptyText: "把商品名称、价格、图片和付款链接配置好之后，会自动显示在这里。"
        },
        products: []
      };
      let currentSha = "";

      const list = document.getElementById("product-list");
      const preview = document.getElementById("preview");
      const statusText = document.getElementById("status");
      const subtitle = document.getElementById("store-subtitle");

      function setStatus(message) {
        statusText.textContent = message;
      }

      function cleanProduct(product = {}) {
        return {
          id: product.id || `product-${Date.now()}`,
          visible: product.visible !== false,
          name: product.name || "新商品",
          badge: product.badge || "可购买",
          price: product.price || "价格待定",
          image: product.image || "",
          description: product.description || "",
          features: Array.isArray(product.features) ? product.features : [],
          paymentUrl: product.paymentUrl || "",
          paymentCode: product.paymentCode || ""
        };
      }

      function syncFromInputs() {
        state.store.subtitle = subtitle.value;
        [...list.querySelectorAll(".product-editor")].forEach((node, index) => {
          const product = state.products[index];
          product.visible = node.querySelector("[data-field='visible']").checked;
          product.name = node.querySelector("[data-field='name']").value.trim();
          product.badge = node.querySelector("[data-field='badge']").value.trim();
          product.price = node.querySelector("[data-field='price']").value.trim();
          product.image = node.querySelector("[data-field='image']").value.trim();
          product.description = node.querySelector("[data-field='description']").value.trim();
          product.paymentUrl = node.querySelector("[data-field='paymentUrl']").value.trim();
          product.paymentCode = node.querySelector("[data-field='paymentCode']").value.trim();
          product.features = node.querySelector("[data-field='features']").value
            .split("\n")
            .map((item) => item.trim())
            .filter(Boolean);
        });
      }

      function render() {
        subtitle.value = state.store.subtitle || "";
        list.innerHTML = "";
        state.products = state.products.map(cleanProduct);
        state.products.forEach((product, index) => {
          const section = document.createElement("section");
          section.className = "product-editor";
          section.innerHTML = `
            <div class="editor-grid">
              <label>显示
                <input data-field="visible" type="checkbox" ${product.visible ? "checked" : ""} />
              </label>
              <label>商品名称
                <input data-field="name" value="${escapeAttr(product.name)}" />
              </label>
              <label>标签
                <input data-field="badge" value="${escapeAttr(product.badge)}" />
              </label>
              <label>价格
                <input data-field="price" value="${escapeAttr(product.price)}" />
              </label>
              <label class="wide">商品图片地址或 data URL
                <input data-field="image" value="${escapeAttr(product.image)}" />
              </label>
              <label class="wide">选择本地图片
                <input data-field="file" type="file" accept="image/*" />
              </label>
              <label class="wide">商品介绍
                <textarea data-field="description">${escapeText(product.description)}</textarea>
              </label>
              <label class="wide">商品亮点，每行一条
                <textarea data-field="features">${escapeText(product.features.join("\n"))}</textarea>
              </label>
              <label class="wide">付款页面链接
                <input data-field="paymentUrl" value="${escapeAttr(product.paymentUrl)}" />
              </label>
              <label class="wide">付款口令
                <input data-field="paymentCode" value="${escapeAttr(product.paymentCode)}" />
              </label>
            </div>
            <div class="actions">
              <button class="ghost" data-action="up">上移</button>
              <button class="ghost" data-action="down">下移</button>
              <button class="danger" data-action="delete">删除</button>
            </div>
          `;
          section.querySelector("[data-field='file']").addEventListener("change", (event) => {
            const file = event.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = () => {
              section.querySelector("[data-field='image']").value = reader.result;
              syncFromInputs();
              updatePreview();
            };
            reader.readAsDataURL(file);
          });
          section.querySelectorAll("input, textarea").forEach((input) => {
            input.addEventListener("input", () => {
              syncFromInputs();
              updatePreview();
            });
            input.addEventListener("change", () => {
              syncFromInputs();
              updatePreview();
            });
          });
          section.querySelector("[data-action='delete']").addEventListener("click", () => {
            syncFromInputs();
            state.products.splice(index, 1);
            render();
          });
          section.querySelector("[data-action='up']").addEventListener("click", () => {
            syncFromInputs();
            if (index > 0) {
              [state.products[index - 1], state.products[index]] = [state.products[index], state.products[index - 1]];
              render();
            }
          });
          section.querySelector("[data-action='down']").addEventListener("click", () => {
            syncFromInputs();
            if (index < state.products.length - 1) {
              [state.products[index + 1], state.products[index]] = [state.products[index], state.products[index + 1]];
              render();
            }
          });
          list.appendChild(section);
        });
        updatePreview();
      }

      function exportData() {
        syncFromInputs();
        return {
          store: state.store,
          products: state.products.map(cleanProduct)
        };
      }

      function updatePreview() {
        preview.textContent = JSON.stringify(exportData(), null, 2);
      }

      function escapeText(value) {
        return String(value ?? "").replace(/[&<>"']/g, (char) => ({
          "&": "&amp;",
          "<": "&lt;",
          ">": "&gt;",
          "\"": "&quot;",
          "'": "&#039;"
        })[char]);
      }

      function escapeAttr(value) {
        return escapeText(value).replace(/\n/g, " ");
      }

      function toBase64(text) {
        return btoa(unescape(encodeURIComponent(text)));
      }

      function githubHeaders() {
        const token = document.getElementById("token").value.trim();
        if (!token) throw new Error("请先填写 GitHub Token");
        return {
          "Authorization": `Bearer ${token}`,
          "Accept": "application/vnd.github+json",
          "X-GitHub-Api-Version": "2022-11-28"
        };
      }

      function repoConfig() {
        return {
          owner: document.getElementById("owner").value.trim(),
          repo: document.getElementById("repo").value.trim(),
          branch: document.getElementById("branch").value.trim()
        };
      }

      async function loadProducts() {
        const { owner, repo, branch } = repoConfig();
        const url = `https://api.github.com/repos/${owner}/${repo}/contents/products.json?ref=${branch}`;
        const response = await fetch(url, { headers: githubHeaders() });
        if (!response.ok) throw new Error(`载入失败：${response.status}`);
        const payload = await response.json();
        currentSha = payload.sha;
        const text = decodeURIComponent(escape(atob(payload.content.replace(/\n/g, ""))));
        const data = JSON.parse(text);
        state.store = data.store || state.store;
        state.products = Array.isArray(data.products) ? data.products : [];
        render();
        setStatus("已载入线上商品。");
      }

      async function saveProducts() {
        const { owner, repo, branch } = repoConfig();
        const data = JSON.stringify(exportData(), null, 2) + "\n";
        const url = `https://api.github.com/repos/${owner}/${repo}/contents/products.json`;
        const body = {
          message: "Update products",
          branch,
          content: toBase64(data)
        };
        if (currentSha) body.sha = currentSha;
        const response = await fetch(url, {
          method: "PUT",
          headers: githubHeaders(),
          body: JSON.stringify(body)
        });
        if (!response.ok) throw new Error(`保存失败：${response.status}`);
        const payload = await response.json();
        currentSha = payload.content.sha;
        setStatus("已保存到 GitHub，公开页面稍后自动更新。");
      }

      document.getElementById("load").addEventListener("click", () => {
        loadProducts().catch((error) => setStatus(error.message));
      });
      document.getElementById("save").addEventListener("click", () => {
        saveProducts().catch((error) => setStatus(error.message));
      });
      document.getElementById("add").addEventListener("click", () => {
        syncFromInputs();
        state.products.push(cleanProduct());
        render();
      });
      document.getElementById("download").addEventListener("click", () => {
        const blob = new Blob([JSON.stringify(exportData(), null, 2) + "\n"], { type: "application/json" });
        const link = document.createElement("a");
        link.href = URL.createObjectURL(blob);
        link.download = "products.json";
        link.click();
        URL.revokeObjectURL(link.href);
      });

      fetch("products.json?v=20260609")
        .then((response) => response.ok ? response.json() : Promise.reject(new Error("products.json")))
        .then((data) => {
          state.store = data.store || state.store;
          state.products = Array.isArray(data.products) ? data.products : [];
          render();
          setStatus("已载入当前发布版本。");
        })
        .catch(() => {
          state.products = [];
          render();
          setStatus("当前没有商品数据，可以新增商品。");
        });
    </script>
  </body>
</html>
